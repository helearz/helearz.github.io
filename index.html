<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Prix de Mathis</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
overflow-x:hidden;
background:linear-gradient(-45deg,#000,#111,#1a1a1a,#3b0000);
background-size:400% 400%;
animation:bg 10s ease infinite;
color:white;
text-align:center;
}

/* 🔳 DRAPEAU (DERRIÈRE) */
.flag{
position:fixed;
top:0;
left:0;
width:100%;
height:70px;
background:repeating-linear-gradient(
45deg,
black 0px,
black 20px,
white 20px,
white 40px
);
opacity:0.25;
z-index:0;
}

/* TITRE AU-DESSUS */
header{
position:relative;
z-index:2;
padding:30px;
font-size:34px;
font-weight:900;
color:#ff2d2d;
}

/* CONTENU */
.card{
position:relative;
z-index:2;
background:rgba(255,255,255,0.08);
margin:15px auto;
padding:20px;
max-width:600px;
border-radius:20px;
backdrop-filter:blur(10px);
}

/* VOITURE (CORRIGÉE) */
.car{
position:absolute;
top:45%;
left:-200px;
font-size:60px;
animation:drive 4s linear infinite;
z-index:1;
}

@keyframes drive{
0%{left:-200px;}
100%{left:110%;}
}

/* BOUTONS */
button{
padding:15px 25px;
border:none;
border-radius:50px;
background:#e10600;
color:white;
cursor:pointer;
margin-top:10px;
}

/* COMPTE À REBOURS */
.countdown{
font-size:26px;
margin-top:10px;
color:#ffd700;
letter-spacing:2px;
}

</style>
</head>

<body>

<!-- SON MOTEUR -->
<audio id="engine" autoplay>
<source src="https://www.soundjay.com/misc/sounds/race-start-1.mp3" type="audio/mp3">
</audio>

<div class="flag"></div>

<header>🏁 GRAND PRIX DE MATHIS</header>

<div class="car">🏎️💨</div>

<div class="card">
<h2>📅 Programme</h2>
<p>🏎️ 12h00 — Essais libres</p>
<p>🍽️ 13h00 — Qualifications</p>
<p>🎂 15h00 — Grand Prix</p>
</div>

<div class="card">
<h2>⏳ Compte à rebours jusqu’au gâteau</h2>
<div class="countdown" id="countdown"></div>
</div>

<div class="card">
<h2>📸 Photos</h2>
<button onclick="window.open('https://drive.google.com/drive/folders/1vAHUjmo9uuLXwTz0SLwGDmGXE8iw9w1y')">Partager mes photos</button>
</div>

<div class="card">
<h2>🎵 Playlist</h2>
<button onclick="window.open('https://link.deezer.com/s/33J6dETgQEhIY5952ahN0')">Ouvrir la playlist</button>
</div>

<script>

confetti({particleCount:200, spread:160, origin:{y:0.3}});

/* ⏳ VRAI COMPTE À REBOURS */
function updateCountdown(){

const now = new Date();
const target = new Date();
target.setHours(15,0,0,0);

if(now > target){
document.getElementById("countdown").innerHTML = "🎂 C'EST L'HEURE DU GRAND PRIX !";
return;
}

let diff = target - now;

let days = Math.floor(diff / (1000*60*60*24));
let hours = Math.floor((diff / (1000*60*60)) % 24);
let minutes = Math.floor((diff / (1000*60)) % 60);
let seconds = Math.floor((diff / 1000) % 60);

document.getElementById("countdown").innerHTML =
`${days}j ${hours}h ${minutes}m ${seconds}s`;

}

setInterval(updateCountdown,1000);
updateCountdown();

/* 🔊 SON MOTEUR (AUTO + CLICK fallback) */
window.addEventListener("click", () => {
const audio = document.getElementById("engine");
audio.volume = 0.6;
audio.play().catch(()=>{});
});

window.addEventListener("load", () => {
const audio = document.getElementById("engine");
audio.volume = 0.6;
audio.play().catch(()=>{});
});

</script>

</body>
</html>
