<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Prix de Mathis</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(-45deg,#000,#111,#1a1a1a,#3b0000);
background-size:400% 400%;
animation:bg 10s ease infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* TITRE */
header{
text-align:center;
padding:30px;
font-size:32px;
font-weight:900;
letter-spacing:2px;
color:#ff2d2d;
}

/* CONTENU */
.container{
position:relative;
z-index:2;
text-align:center;
padding:20px;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
margin:15px auto;
border-radius:20px;
max-width:600px;
backdrop-filter:blur(10px);
}

/* BOUTONS */
button{
margin:10px;
padding:15px 25px;
border:none;
border-radius:50px;
cursor:pointer;
font-size:16px;
background:#e10600;
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* VOITURE F1 */
.car{
position:absolute;
top:40%;
left:-200px;
font-size:60px;
animation:drive 4s linear infinite;
z-index:1;
}

@keyframes drive{
0%{left:-200px; transform:rotate(0deg);}
25%{transform:rotate(10deg);}
50%{transform:rotate(-10deg);}
100%{left:110%; transform:rotate(0deg);}
}

</style>

</head>

<body>

<header>
🏁 GRAND PRIX DE MATHIS
</header>

<!-- VOITURE QUI TRAVERSE -->
<div class="car">🏎️💨</div>

<div class="container">

<div class="card">
<h2>📅 Programme</h2>

<p>🏎️ 12h00 — Essais libres (Arrivée des pilotes)</p>
<p>🍽️ 13h00 — Qualifications (Repas)</p>
<p>🎂 15h00 — Grand Prix (Gâteau)</p>
</div>

<div class="card">
<h2>📸 Photos</h2>
<button onclick="window.open('https://drive.google.com/drive/folders/1vAHUjmo9uuLXwTz0SLwGDmGXE8iw9w1y?dmr=1&ec=wgc-drive-%5Bmodule%5D-goto')">
Partager mes photos
</button>
</div>

<div class="card">
<h2>🎵 Playlist</h2>
<button onclick="window.open('https://link.deezer.com/s/33J6dETgQEhIY5952ahN0')">
Ouvrir la playlist
</button>
</div>

</div>

<script>

/* CONFETTIS AU LANCEMENT */
confetti({
particleCount:200,
spread:160,
origin:{y:0.3}
});

</script>

</body>
</html>
